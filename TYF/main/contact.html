<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<link rel="stylesheet" href="interactions.css?v=13" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet" />

  <title>Contact | Teach Youth First</title>
  <meta name="description" content="Get in touch with Teach Youth First to volunteer or partner with us." />
  <link rel="canonical" href="https://teachyouthfirst/contact.html" />
</head>
<body class="page-loading" data-page="contact">
  <div id="site-nav"></div>
  <main class="page-main">
<!-- Contact Section -->
  <section id="contact" class="section contact-section">
    <div class="container">
      <div class="section-header" data-aos="fade-up">
        <h2 class="section-title">GET IN TOUCH</h2>
        <p class="section-subtitle">
          Ready to make a difference? Join our mission today.
        </p>
      </div>
      <div class="contact-content">
        <div class="contact-info" data-aos="fade-right">
          <div class="contact-item">
            <div class="contact-icon">
              <i class="fas fa-envelope"></i>
            </div>
            <div class="contact-details">
              <h4>Email</h4>
              <p>teachyouthfirst@gmail.com</p>
            </div>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <i class="fas fa-phone"></i>
            </div>
            <div class="contact-details">
              <h4>Phone</h4>
              <p>016-850-9910 (Debre)</p>
            </div>
          </div>
        </div>
        <div class="contact-form" data-aos="fade-left">
          <form>
            <div class="form-group">
              <input type="text" placeholder="Your Name" required />
            </div>
            <div class="form-group">
              <input type="email" placeholder="Your Email" required />
            </div>
            <div class="form-group">
              <input type="text" placeholder="Subject" />
            </div>
            <div class="form-group">
              <textarea placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">
              Send Message
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>
  </main>
  <div id="site-footer"></div>
  <script src="layout.js?v=13"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js?v=13"></script>
</body>
</html>
